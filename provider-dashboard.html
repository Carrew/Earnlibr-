<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnLibr — Provider Dashboard</title>

<style>
:root {
  --bg: #0b0d17;
  --card: rgba(15,23,36,0.85);
  --accent1: #4a90e2;
  --accent2: #a3ff6e;
  --muted: #bfc7d6;
  --danger: #ef4444;
  --success: #4ade80;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: Inter, system-ui, Arial;
  background: var(--bg);
  color: #eef2f7;
}

/* Sidebar */
#menuToggle { display:none; }
.menu-icon {
  position:fixed;
  top:20px;
  left:20px;
  cursor:pointer;
  width:30px;
  height:22px;
  z-index:1100;
}
.menu-icon span {
  display:block;
  height:3px;
  background:var(--accent1);
  margin:4px 0;
  border-radius:2px;
}
.sidebar {
  position:fixed;
  left:-280px;
  top:0;
  width:280px;
  height:100%;
  background:var(--card);
  padding-top:60px;
  transition:0.4s;
}
.sidebar a {
  display:flex;
  gap:10px;
  padding:15px 20px;
  color:#fff;
  text-decoration:none;
}
#menuToggle:checked ~ .sidebar { left:0; }

.main-content {
  padding:20px;
  transition:0.4s;
}
#menuToggle:checked ~ .main-content {
  margin-left:280px;
}

/* Profile */
.profile-card {
  background:var(--card);
  max-width:650px;
  margin:80px auto 20px;
  padding:25px;
  border-radius:18px;
  text-align:center;
}

.profile-avatar img {
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid var(--accent1);
}

h2 { margin-top:10px; }

p { color:var(--muted); }

.stats {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

.stat {
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  font-size:13px;
}

/* 🔥 ACTION BOX (NEW CORE FEATURE) */
.action-box {
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background: linear-gradient(135deg, rgba(74,144,226,0.15), rgba(163,255,110,0.08));
  text-align:left;
}

.action-box h3 {
  margin-bottom:6px;
}

.action-box p {
  font-size:13px;
  color:var(--muted);
}

/* Buttons */
.btn {
  display:block;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
}

.primary { background:#25D366; color:#000; }
.secondary { background:#1877F2; color:#fff; }

.logout {
  margin-top:15px;
  background:var(--danger);
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

.notice {
  font-size:12px;
  color:var(--muted);
  margin-top:10px;
}

.notif {
  display:none;
  text-align:center;
  margin:10px;
  padding:10px;
}

.error { color:var(--danger); }

</style>
</head>

<body>

<input type="checkbox" id="menuToggle">
<label for="menuToggle" class="menu-icon">
  <span></span><span></span><span></span>
</label>

<div class="sidebar">
  <a href="providers-create-offer.html">➕ Create Offer</a>
  <a href="providers-my-offer.html">📦 My Offers</a>
  <a href="providers-deals-management.html">💼 Deals</a>
  <a href="provider-notification.html">🔔 Notifications</a>
  <a href="providers-bills.html">💰 Payments</a>
  <a href="provider-chat.html">💬 Chat</a>
</div>

<div class="main-content">

<div id="notif" class="notif"></div>

<div class="profile-card">

  <div class="profile-avatar">
    <img src="https://raw.githubusercontent.com/Carrew/Earnlibr-/refs/heads/main/1000115452-01.jpeg">
  </div>

  <h2 id="name"></h2>
  <p id="email"></p>

  <div class="stats">
    <div class="stat">📱 <span id="phone"></span></div>
    <div class="stat">🌍 <span id="country"></span></div>
    <div class="stat">🎯 <span id="ref"></span></div>
    <div class="stat">📅 <span id="date"></span></div>
  </div>

  <!-- 🔥 NEW ACTION FLOW -->
  <div class="action-box">
    <h3>🚀 Start Earning as Provider</h3>
    <p>Create your first offer and start receiving engagement from promoters.</p>

    <a class="btn primary" href="providers-create-offer.html">
      ➕ Create Your First Offer
    </a>

    <a class="btn secondary" href="providers-my-offer.html">
      📦 View My Offers
    </a>

    <p class="notice">
      💡 Tip: Active providers get more promoter engagement within 24–48 hours.
    </p>
  </div>

  <button class="logout" id="logout">Logout</button>

</div>

</div>

<script>

const session = JSON.parse(localStorage.getItem("userSession") || "null");
const notif = document.getElementById("notif");

if(!session || session.role !== "provider"){
  notif.style.display = "block";
  notif.className = "error";
  notif.textContent = "Access denied. Redirecting...";
  setTimeout(()=>location.href="login.html",2000);
} else {
  document.getElementById("name").textContent = session.name;
  document.getElementById("email").textContent = session.email;
  document.getElementById("phone").textContent = session.phone || "N/A";
  document.getElementById("country").textContent = session.country || "N/A";
  document.getElementById("ref").textContent = session.referralCode || "No code";
  document.getElementById("date").textContent =
    session.createdAt ? new Date(session.createdAt).toLocaleDateString() : "N/A";
}

document.getElementById("logout").onclick = ()=>{
  localStorage.removeItem("userSession");
  location.href="login.html";
};

</script>

</body>
</html>
