<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnLibr — Promoter Dashboard</title>

<style>
:root {
  --bg: #0b0d17;
  --card: rgba(15,23,36,0.85);
  --accent1: #4a90e2;
  --accent2: #a3ff6e;
  --muted: #bfc7d6;
  --danger: #ef4444;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: Inter, system-ui, Arial;
  background: var(--bg);
  color: #eef2f7;
}

/* Sidebar */
#menuToggle { display:none; }
.menu-icon {
  position:fixed;
  top:20px;
  left:20px;
  cursor:pointer;
  width:30px;
  height:22px;
  z-index:1100;
}
.menu-icon span {
  display:block;
  height:3px;
  background:var(--accent1);
  margin:4px 0;
  border-radius:2px;
}
.sidebar {
  position:fixed;
  left:-280px;
  top:0;
  width:280px;
  height:100%;
  background:var(--card);
  padding-top:60px;
  transition:0.4s;
}
.sidebar a {
  display:flex;
  gap:10px;
  padding:15px 20px;
  color:#fff;
  text-decoration:none;
}
#menuToggle:checked ~ .sidebar { left:0; }

.main-content {
  padding:20px;
}

/* CARD */
.profile-card {
  background:var(--card);
  max-width:600px;
  margin:90px auto 20px;
  padding:25px;
  border-radius:18px;
  text-align:center;
}

.profile-avatar img {
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid var(--accent1);
}

h2 { margin-top:10px; }
p { color:var(--muted); }

/* STATS */
.stats {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

.stat {
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  font-size:13px;
}

/* ACTION BOX */
.action-box {
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background: linear-gradient(135deg, rgba(74,144,226,0.15), rgba(163,255,110,0.08));
}

.btn {
  display:block;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  text-align:center;
}

.whatsapp { background:#25D366; color:#000; }
.messenger { background:#1877F2; color:#fff; }

.logout {
  margin-top:15px;
  background:var(--danger);
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

/* 🔥 FLASHING ALERT */
.alert {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background: linear-gradient(90deg, #ff4d4d, #ff9900);
  color:#000;
  padding:12px;
  text-align:center;
  font-weight:bold;
  animation: blink 1s infinite;
  z-index:2000;
}

@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0.5;}
  100% {opacity:1;}
}

.hide {
  display:none;
}

.small-btn {
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#111;
  color:#fff;
  font-size:12px;
}
</style>
</head>

<body>

<!-- 🔥 ALERT -->
<div id="alertBox" class="alert">
🚨 IMPORTANT: Join your Promoter Groups to start earning!
</div>

<input type="checkbox" id="menuToggle">
<label for="menuToggle" class="menu-icon">
  <span></span><span></span><span></span>
</label>

<div class="sidebar">
  <a href="promoters-get-offers.html">💵 Start Earning</a>
  <a href="promoters-promotions.html">📢 Promotions</a>
  <a href="promoters-wallet.html">💰 Wallet</a>
</div>

<div class="main-content">

<div class="profile-card">

  <div class="profile-avatar">
    <img src="https://raw.githubusercontent.com/Carrew/Earnlibr-/refs/heads/main/1000115452-01.jpeg">
  </div>

  <h2 id="name"></h2>
  <p id="email"></p>

  <div class="stats">
    <div class="stat">📱 <span id="phone"></span></div>
    <div class="stat">🎯 <span id="ref"></span></div>
  </div>

  <!-- JOIN GROUP SECTION -->
  <div class="action-box">
    <h3>🔥 Join Your Community</h3>
    <p>Join both groups to start receiving offers & earning commissions.</p>

    <a class="btn whatsapp" href="https://chat.whatsapp.com/IKq3VjnTXkVIWaa4RoNXsp?mode=gi_t" target="_blank" onclick="markJoined()">
      Join WhatsApp Group
    </a>

    <a class="btn messenger" href="https://m.me/j/AbZi9sWNJvMyMJ1k/?send_source=gc%3Acopy_invite_link_c" target="_blank" onclick="markJoined()">
      Join Messenger Group
    </a>

    <button class="small-btn" onclick="markJoined()">
      ✅ I Already Joined
    </button>

    <p style="margin-top:10px;font-size:12px;color:#bfc7d6;">
      The alert will disappear once you confirm joining.
    </p>
  </div>

  <button class="logout" id="logout">Logout</button>

</div>

</div>

<script>

const session = JSON.parse(localStorage.getItem("userSession") || "null");
const alertBox = document.getElementById("alertBox");

if(!session || session.role !== "freelancer"){
  location.href="login.html";
} else {
  document.getElementById("name").textContent = session.name;
  document.getElementById("email").textContent = session.email;
  document.getElementById("phone").textContent = session.phone || "N/A";
  document.getElementById("ref").textContent = session.referralCode || "No code";
}

/* 🔥 CHECK JOIN STATUS */
function checkJoinStatus(){
  const joined = localStorage.getItem("promoterJoinedGroup");
  if(joined === "true"){
    alertBox.classList.add("hide");
  }
}
checkJoinStatus();

/* 🔥 MARK JOIN */
function markJoined(){
  localStorage.setItem("promoterJoinedGroup","true");
  alertBox.classList.add("hide");
}

/* LOGOUT */
document.getElementById("logout").onclick = ()=>{
  localStorage.removeItem("userSession");
  location.href="login.html";
};

</script>

</body>
</html>
