<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>EarnLibr — Promoter Dashboard</title>  

<style>  
:root {  
  --bg: #0b0d17;  
  --card: rgba(15,23,36,0.85);  
  --accent1: #4a90e2;  
  --accent2: #a3ff6e;  
  --muted: #bfc7d6;  
  --danger: #ef4444;  
  --success: #4ade80;  
}  

* { box-sizing: border-box; margin:0; padding:0; }  

body {  
  font-family: Inter, system-ui, Arial;  
  background: var(--bg);  
  color: #eef2f7;  
  min-height: 100vh;  
}  

/* Sidebar */  
#menuToggle { display: none; }  
.menu-icon {  
  position: fixed; top: 20px; left: 20px;  
  cursor: pointer; width: 30px; height: 22px; z-index: 1100;  
}  
.menu-icon span {  
  display: block; height: 3px; background: var(--accent1); margin:4px 0;  
}  
.sidebar {  
  position: fixed; top:0; left:-280px; width:280px; height:100%;  
  background: var(--card); padding-top:60px; transition:0.4s;  
}  
.sidebar a {  
  display:flex; gap:10px; padding:15px 20px; color:#fff; text-decoration:none;  
}  
#menuToggle:checked ~ .sidebar { left:0; }  

.main-content { padding:20px; transition:0.4s; }  
#menuToggle:checked ~ .main-content { margin-left:280px; }  

/* HERO */  
.profile-card {  
  background: var(--card);  
  padding: 25px;  
  border-radius: 18px;  
  text-align:center;  
  max-width:600px;  
  margin:80px auto 20px;  
}  

.profile-avatar img {  
  width:90px; height:90px; border-radius:50%; border:3px solid var(--accent1);  
}  

h2 { margin-top:10px; }  
p { color:var(--muted); }  

/* STATS */  
.stats {  
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;  
}  
.stat {  
  background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; font-size:13px;  
}  

/* ACTION BOX */  
.action-box {  
  margin-top:20px;  
  background: linear-gradient(135deg, rgba(74,144,226,0.15), rgba(163,255,110,0.08));  
  padding:15px;  
  border-radius:12px;  
}  

.action-box h3 { margin-bottom:8px; }  

.btn {  
  display:block;  
  margin-top:10px;  
  padding:12px;  
  border-radius:10px;  
  text-decoration:none;  
  text-align:center;  
  font-weight:bold;  
}  

.btn.primary { background:#25D366; color:#000; }  
.btn.secondary { background:#1877F2; color:#fff; }  

.logout-btn {  
  margin-top:15px;  
  background: var(--danger);  
  color:#fff;  
  border:none;  
  padding:10px 15px;  
  border-radius:10px;  
  cursor:pointer;  
  width:100%;  
}  

.notif { display:none; margin:10px auto; padding:10px; text-align:center; }  
.error { color:var(--danger); }  

</style>  
</head>  

<body>  

<input type="checkbox" id="menuToggle">  
<label for="menuToggle" class="menu-icon">  
  <span></span><span></span><span></span>  
</label>  

<div class="sidebar">  
  <a href="promoters-get-offers.html">📦 Get Offers</a>  
  <a href="promoters-notifications.html">🔔 Notifications</a>  
  <a href="promoters-promotions.html">📢 Promotions</a>  
  <a href="promoters-wallet.html">💰 Wallet</a>  
</div>  

<div class="main-content">  

<div id="notif" class="notif"></div>  

<div class="profile-card">  

  <div class="profile-avatar">  
    <img src="https://raw.githubusercontent.com/Carrew/Earnlibr-/refs/heads/main/1000115452-01.jpeg">  
  </div>  

  <h2 id="name"></h2>  
  <p id="email"></p>  

  <div class="stats">  
    <div class="stat">📱 <span id="phone"></span></div>  
    <div class="stat">🎯 <span id="ref"></span></div>  
  </div>  

  <!-- 🔥 NEW: ACTION SECTION -->  
  <div class="action-box">  
    <h3>🚀 Start Earning</h3>  
    <p style="font-size:13px;color:#bfc7d6;">Join your community and start sharing offers today.</p>  

    <a class="btn primary" href="promoters-get-offers.html">Get Offers</a>  
    <a class="btn secondary" href="promoters-promotions.html">How to Promote</a>  
  </div>  

  <button id="logout" class="logout-btn">Logout</button>  

</div>  

</div>  

<script>  

const session = JSON.parse(localStorage.getItem("userSession") || "null");  
const notif = document.getElementById("notif");  

if(!session || session.role !== "freelancer"){  
  notif.style.display = "block";  
  notif.className = "error";  
  notif.textContent = "Access denied. Redirecting...";  
  setTimeout(()=>location.href="login.html",2000);  
} else {  
  document.getElementById("name").textContent = session.name;  
  document.getElementById("email").textContent = session.email;  
  document.getElementById("phone").textContent = session.phone || "N/A";  
  document.getElementById("ref").textContent = session.referralCode || "No code";  
}  

document.getElementById("logout").onclick = ()=>{  
  localStorage.removeItem("userSession");  
  location.href="login.html";  
};  

</script>  

</body>  
</html>
