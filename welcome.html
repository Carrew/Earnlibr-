<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to EarnLibr</title>

<style>
  body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b0d17;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    text-align:center;
  }

  .box {
    max-width:420px;
    padding:25px;
  }

  h1 {
    font-size:24px;
    background:linear-gradient(90deg,#4a90e2,#a3ff6e);
    -webkit-background-clip:text;
    color:transparent;
    margin-bottom:10px;
  }

  p {
    color:#bfc7d6;
    font-size:14px;
    margin-bottom:20px;
  }

  .btn {
    display:block;
    margin:10px 0;
    padding:12px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    font-size:14px;
  }

  .whatsapp {
    background:#25D366;
    color:#000;
  }

  .messenger {
    background:#1877F2;
    color:#fff;
  }

  .login {
    display:block;
    margin-top:18px;
    font-size:13px;
    color:#aaa;
    text-decoration:underline;
  }

  .note {
    font-size:12px;
    color:#888;
    margin-top:15px;
  }
</style>
</head>

<body>

<div class="box">

  <h1>🎉 Welcome to EarnLibr</h1>

  <p>You’re 1 step away from starting your earning journey 💰</p>

  <!-- Role-based links -->
  <a id="whatsapp" class="btn whatsapp" href="#">
    Join WhatsApp Group
  </a>

  <a id="messenger" class="btn messenger" href="#">
    Join Messenger Group
  </a>

  <p class="note">🎓 Free affiliate marketing course is inside the group</p>

  <!-- Login button -->
  <a href="login.html" class="login">
    Already have an account? Login
  </a>

</div>

<script>
  // Get user role from signup
  const role = localStorage.getItem("userRole");

  const whatsapp = document.getElementById("whatsapp");
  const messenger = document.getElementById("messenger");

  // Provider links
  const providerWhatsApp = "https://chat.whatsapp.com/HmnJW1MnfwB2zcv3o2V7tn?mode=gi_t";
  const providerMessenger = "https://m.me/j/AbbMgOg7zpqdSHwZ/?send_source=gc%3Acopy_invite_link_c";

  // Promoter links
  const promoterWhatsApp = "https://chat.whatsapp.com/IKq3VjnTXkVIWaa4RoNXsp?mode=gi_t";
  const promoterMessenger = "https://m.me/j/AbZi9sWNJvMyMJ1k/?send_source=gc%3Acopy_invite_link_c";

  // Assign based on role
  if (role === "provider") {
    whatsapp.href = providerWhatsApp;
    messenger.href = providerMessenger;
  } else {
    whatsapp.href = promoterWhatsApp;
    messenger.href = promoterMessenger;
  }
</script>

</body>
</html>
